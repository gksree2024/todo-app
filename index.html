<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-do App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>To-do App</h1>
    <p class="subtitle">Organize your tasks, filter your workflow, and keep progress visible.</p>

    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Add a new task" aria-label="Task input">
      <button id="addBtn">Add</button>
    </div>

    <div class="toolbar">
      <div class="task-info">
        <span id="remainingCount">0</span> tasks left
      </div>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
      <button id="clearCompleted" class="secondary">Clear completed</button>
    </div>

    <ul id="taskList" class="task-list"></ul>
    <p id="emptyMessage" class="empty-message">Your task list is empty. Add a new task to get started.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
